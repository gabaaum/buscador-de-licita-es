<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Licitações Pagas - MIB Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#2ecc71',
                            600: '#27ae60',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #2ecc71;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8 font-sans">
    <div class="absolute top-4 right-8 flex gap-4">
        <a href="{{ url_for('escolha') }}" class="text-gray-400 hover:text-white transition duration-200 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span>Voltar</span>
        </a>
        <a href="{{ url_for('logout') }}" class="text-gray-400 hover:text-white transition duration-200 flex items-center gap-2">
            <span>Sair</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        </a>
    </div>
    
    <div class="max-w-[95%] mx-auto">
        <header class="mb-10 text-center flex justify-center items-center gap-3">
            <span class="text-4xl">💰</span>
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-green-600">
                Consulta de Licitações Pagas
            </h1>
        </header>
        <p class="text-gray-400 mt-2 text-center mb-8">Portal da Transparência</p>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-8">
            <!-- Form Section -->
            <div class="lg:col-span-3 bg-gray-800 rounded-xl p-6 shadow-xl border border-gray-700">
                <form id="searchForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-sm text-gray-400">Esfera/Estado</label>
                        <select id="estado" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 transition">
                            <option value="federal">Federal (Portal da Transparência Gov)</option>
                            <option value="sp">São Paulo (SP)</option>
                            <option value="rj">Rio de Janeiro (RJ)</option>
                            <option value="mg">Minas Gerais (MG)</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400">Data Inicial</label>
                        <input type="date" id="dataInicial" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 transition">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400">Data Final</label>
                        <input type="date" id="dataFinal" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 transition">
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-sm text-gray-400">Órgão Superior / Entidade Vinculada</label>
                        <input type="text" id="orgao" placeholder="Ex: Ministério da Saúde" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 transition">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400">Município</label>
                        <input type="text" id="municipio" placeholder="Ex: São Paulo" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 transition">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400">CPF/CNPJ do Contratado</label>
                        <input type="text" id="cnpj" placeholder="Apenas números" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 transition">
                    </div>
                    
                    <div class="md:col-span-2 mt-4 flex justify-end">
                        <button type="submit" id="searchBtn" class="bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3 px-8 rounded-lg flex items-center justify-center gap-2 transition duration-200 w-full md:w-auto">
                            <span id="btnText">Buscar Licitações Pagas</span>
                            <div id="loadingSpinner" class="spinner hidden"></div>
                        </button>
                    </div>
                </form>
                <div id="errorMsg" class="hidden mt-4 text-red-400 text-sm"></div>
            </div>

            <!-- Logs Panel -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-xl border border-gray-700 flex flex-col">
                <h3 class="font-semibold text-gray-300 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Status
                </h3>
                <div id="logsContainer" class="flex-1 bg-gray-900 rounded-lg p-4 font-mono text-xs text-gray-400 overflow-y-auto max-h-[300px] space-y-2">
                    <div>Aguardando pesquisa...</div>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl shadow-xl overflow-hidden border border-gray-700 hidden" id="resultsContainer">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center flex-wrap gap-4">
                <div>
                    <h2 class="text-xl font-semibold inline-block">Resultados Encontrados</h2>
                    <span id="resultsCount" class="bg-brand-600 text-xs px-3 py-1 rounded-full font-bold ml-2">0</span>
                </div>
                <button id="downloadBtn" class="bg-green-600 hover:bg-green-500 text-white font-semibold py-2 px-4 rounded-lg flex items-center gap-2 transition duration-200 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Baixar Planilha (.xlsx)
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse table-fixed">
                    <thead>
                        <tr class="bg-gray-700 text-gray-300 text-sm uppercase tracking-wider">
                            <th class="p-4 font-medium border-b border-gray-600 w-32">Número</th>
                            <th class="p-4 font-medium border-b border-gray-600 w-32">Data</th>
                            <th class="p-4 font-medium border-b border-gray-600 w-48">Órgão</th>
                            <th class="p-4 font-medium border-b border-gray-600">Objeto</th>
                            <th class="p-4 font-medium border-b border-gray-600 w-32">Situação</th>
                            <th class="p-4 font-medium border-b border-gray-600 w-32">Valor Homologado</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="divide-y divide-gray-700 text-sm">
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="p-8 text-center text-gray-400 hidden">
                Nenhuma licitação encontrada.
            </div>
        </div>
    </div>

    <script>
        function addLog(msg) {
            const logs = document.getElementById('logsContainer');
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.textContent = `[${time}] ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                estado: document.getElementById('estado').value,
                dataInicial: document.getElementById('dataInicial').value,
                dataFinal: document.getElementById('dataFinal').value,
                orgao: document.getElementById('orgao').value,
                municipio: document.getElementById('municipio').value,
                cnpj: document.getElementById('cnpj').value,
            };

            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const searchBtn = document.getElementById('searchBtn');
            const errorMsg = document.getElementById('errorMsg');
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsBody = document.getElementById('resultsBody');
            const resultsCount = document.getElementById('resultsCount');
            const logsContainer = document.getElementById('logsContainer');

            errorMsg.classList.add('hidden');
            btnText.textContent = 'Buscando...';
            spinner.classList.remove('hidden');
            searchBtn.disabled = true;
            searchBtn.classList.add('opacity-75', 'cursor-not-allowed');
            resultsContainer.classList.add('hidden');
            resultsBody.innerHTML = '';
            logsContainer.innerHTML = '';

            addLog('Iniciando busca no Portal da Transparência...');

            try {
                const response = await fetch('/api/search_pagas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao realizar a busca no servidor');
                }
                
                resultsContainer.classList.remove('hidden');
                
                if (data.results && data.results.length > 0) {
                    window.globalResults = data.results;
                    document.getElementById('emptyState').classList.add('hidden');
                    resultsCount.textContent = data.results.length;
                    
                    addLog(`Busca concluída. ${data.results.length} resultados encontrados.`);
                    
                    data.results.slice(0, 50).forEach(item => {
                        const tr = document.createElement('tr');
                        tr.className = 'hover:bg-gray-750 transition duration-150 group';
                        
                        tr.innerHTML = `
                            <td class="p-4 align-top font-medium text-brand-400 break-words">${item.numero || '-'}</td>
                            <td class="p-4 align-top text-gray-400 break-words">${item.data_publicacao || '-'}</td>
                            <td class="p-4 align-top break-words"><div class="line-clamp-3" title="${item.orgao || '-'}">${item.orgao || '-'}</div></td>
                            <td class="p-4 align-top text-gray-300 break-words"><div class="line-clamp-3" title="${item.objeto || '-'}">${item.objeto || '-'}</div></td>
                            <td class="p-4 align-top"><div class="truncate bg-gray-600 text-white text-[10px] px-2 py-1 rounded-full font-semibold inline-block text-center w-full">${item.situacao || '-'}</div></td>
                            <td class="p-4 align-top text-brand-400 font-medium break-words">${item.valor_homologado || '-'}</td>
                        `;
                        resultsBody.appendChild(tr);
                    });
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                    resultsCount.textContent = '0';
                    addLog('Busca concluída. Nenhum resultado encontrado.');
                }
                
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
                addLog(`Erro: ${error.message}`);
            } finally {
                btnText.textContent = 'Buscar Licitações Pagas';
                spinner.classList.add('hidden');
                searchBtn.disabled = false;
                searchBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!window.globalResults || window.globalResults.length === 0) return;
            
            const ws = XLSX.utils.json_to_sheet(window.globalResults.map(item => ({
                "Número da Licitação": item.numero || '-',
                "Data de Publicação": item.data_publicacao || '-',
                "Órgão": item.orgao || '-',
                "Objeto": item.objeto || '-',
                "Modalidade": item.modalidade || '-',
                "Situação": item.situacao || '-',
                "Valor Homologado": item.valor_homologado || '-'
            })));

            const wb = XLSX.utils.book_new();
            
            const colWidths = [
                { wch: 25 }, // Número
                { wch: 20 }, // Data
                { wch: 50 }, // Órgão
                { wch: 80 }, // Objeto
                { wch: 25 }, // Modalidade
                { wch: 20 }, // Situação
                { wch: 25 }  // Valor Homologado
            ];
            ws['!cols'] = colWidths;

            const range = XLSX.utils.decode_range(ws['!ref']);
            for(let C = range.s.c; C <= range.e.c; ++C) {
                const address = XLSX.utils.encode_col(C) + "1"; 
                if(!ws[address]) continue;
                ws[address].s = {
                    font: { bold: true, color: { rgb: "FFFFFF" } },
                    fill: { fgColor: { rgb: "27ae60" } }, // Verde para o cabecalho
                    alignment: { horizontal: "center" }
                };
            }

            XLSX.utils.book_append_sheet(wb, ws, "Licitações Pagas");
            XLSX.writeFile(wb, `licitacoes_pagas_${new Date().getTime()}.xlsx`);
        });
    </script>
</body>
</html>
